<ol class="post-card-box clearfix">
  {% for post in site.posts %}
    {% if post.categories contains 'portfolio' %}
      <li>
        <div class="post-card">
          <a href="{{post.url | prepend: site.baseurl}}" class="post-card-image" style="background-image:linear-gradient(to right,rgba(65, 0, 255, 0.4),rgba(255, 0, 232, 0.3)), url( {{post.image}} )">
          </a>

          <div class="post-card-body">
            {% for tag in post.tags %}
            <a href="{{site.baseurl}}/tags#{{tag}}" class="tag">|&#32;{{ tag }}</a>
            {% endfor %}
            <a href="{{post.url | prepend: site.baseurl}}" class="post-card-link"><h3 class="post-card-title">{{post.title}}</h3></a>
          </div>

        </div>
      </li>
    {% endif %}
  {% endfor %}
</ol>
